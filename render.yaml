services:
  - type: web
    name: idbi-fin-backend
    env: python
    buildCommand: "pip install -e ml && pip install -r backend/requirements.txt"
    startCommand: "cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: MSME_ENVIRONMENT
        value: production
      - key: MSME_CORS_ORIGINS
        value: "https://idbi-fin.onrender.com"
