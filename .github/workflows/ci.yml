name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  ml:
    name: ML (lint + train smoke + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ml
    env:
      KMP_DUPLICATE_LIB_OK: "TRUE"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e . --no-deps
      - name: Lint
        run: ruff check msme_ml
      - name: Generate small dataset + train (validates the AUC >= 0.80 gate)
        run: |
          python -m msme_ml.generate --n 6000 --seed 42
          python -m msme_ml.train
      - name: Tests
        run: pytest -p no:cacheprovider

  backend:
    name: Backend (lint + tests, uses bundled model)
    runs-on: ubuntu-latest
    env:
      KMP_DUPLICATE_LIB_OK: "TRUE"
      MSME_DATABASE_URL: "sqlite:///./ci.db"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ./ml
          pip install -r backend/requirements.txt
      - name: Lint
        run: ruff check backend/app
      - name: Tests
        working-directory: backend
        run: pytest -p no:cacheprovider

  frontend:
    name: Frontend (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npm run build
